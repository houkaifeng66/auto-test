- name: 获取商品类目列表
  request:
    method: GET
    url: /admin/category/list
    params:  
      page: 1
      limit: 20
    headers:
    
      X-Litemall-Admin-Token: ${token}

  validate:
   - eq: ["status_code", 200]
   - eq: ["body.errno", 0]
   - eq: ["body.errmsg", "成功"]

  extract:
  # 如果你想拿列表里第一个分类的ID供后续使用
    first_category_id: body.data.list[0].id